{% extends "core/base.html" %}
{% block title %}HappyTogether — Новая группа{% endblock %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h1 class="h3 mb-1">Новая группа</h1>
      <div class="muted">Создание рабочей группы</div>
    </div>
    <a class="btn btn-light pill" href="{% url 'group_list' %}">← Назад</a>
  </div>

  <div class="card card-soft">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Название</label>
          {{ form.name }}
        </div>

        <div class="mb-3">
          <label class="form-label">Описание</label>
          {{ form.description }}
        </div>

        <button class="btn btn-success pill" type="submit">Создать группу</button>
      </form>
    </div>
  </div>
{% endblock %}
